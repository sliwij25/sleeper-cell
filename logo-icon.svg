<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">

  <!-- Background -->
  <rect width="80" height="80" rx="12" fill="#001C1C"/>

  <!-- Football body -->
  <ellipse cx="40" cy="40" rx="22" ry="14" fill="none" stroke="#10B981" stroke-width="2"/>

  <!-- Football laces -->
  <line x1="40" y1="29" x2="40" y2="51" stroke="#10B981" stroke-width="1.5"/>
  <line x1="36" y1="34" x2="44" y2="34" stroke="#10B981" stroke-width="1.5"/>
  <line x1="36" y1="40" x2="44" y2="40" stroke="#10B981" stroke-width="1.5"/>
  <line x1="36" y1="46" x2="44" y2="46" stroke="#10B981" stroke-width="1.5"/>

  <!-- Crosshair — horizontal -->
  <line x1="4"  y1="40" x2="14" y2="40" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="66" y1="40" x2="76" y2="40" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crosshair — vertical -->
  <line x1="40" y1="4"  x2="40" y2="14" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="66" x2="40" y2="76" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Corner brackets -->
  <polyline points="10,20 10,10 20,10" fill="none" stroke="#10B981" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="60,10 70,10 70,20" fill="none" stroke="#10B981" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="10,60 10,70 20,70" fill="none" stroke="#10B981" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="60,70 70,70 70,60" fill="none" stroke="#10B981" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center dot -->
  <circle cx="40" cy="40" r="2.5" fill="#10B981"/>

</svg>
